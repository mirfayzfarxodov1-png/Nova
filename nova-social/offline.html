<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - NOVA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .offline-container {
            max-width: 400px;
        }
        .offline-icon {
            font-size: 80px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #fff, #ff0000);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        p {
            color: #888;
            margin-bottom: 20px;
            line-height: 1.6;
        }
        button {
            background: linear-gradient(135deg, #ff0000, #cc0000);
            color: #fff;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
        .retry-text {
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Internet aloqasi yo'q</h1>
        <p>NOVA dan foydalanish uchun internet aloqasi kerak.<br>Iltimos, internet aloqasini tekshiring va qayta urining.</p>
        <button onclick="location.reload()">🔄 Qayta urinish</button>
        <div class="retry-text">Avvalgi ko'rilgan kontentlar offline rejimda mavjud</div>
    </div>
</body>
</html>
