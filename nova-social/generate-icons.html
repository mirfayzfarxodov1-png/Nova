<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NOVA Icon Generator</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 40px;
        }
        button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px;
        }
        .icon-list {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }
        .icon-item {
            background: #1a1a1a;
            padding: 15px;
            border-radius: 16px;
            text-align: center;
        }
        canvas {
            display: block;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>🎨 NOVA Icon Generator</h1>
    <p>Ikonkalarni yaratish uchun tugmani bosing</p>
    
    <button id="downloadAll">📦 Barcha ikonkalarni yuklab olish</button>
    <div class="icon-list" id="iconList"></div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script>
        const sizes = [72, 96, 128, 144, 152, 192, 256, 384, 512];
        
        function drawIcon(size) {
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            
            // Background
            const grad = ctx.createLinearGradient(0, 0, size, size);
            grad.addColorStop(0, '#ff0000');
            grad.addColorStop(1, '#cc0000');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, size, size);
            
            // Border
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = size * 0.015;
            ctx.strokeRect(size * 0.04, size * 0.04, size * 0.92, size * 0.92);
            
            // Letter N
            ctx.fillStyle = '#ffffff';
            ctx.font = `bold ${size * 0.44}px "Inter", Arial, sans-serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('N', size/2, size/2);
            
            // Bottom text
            if (size >= 128) {
                ctx.font = `${size * 0.11}px "Inter", Arial, sans-serif`;
                ctx.fillStyle = 'rgba(255,255,255,0.9)';
                ctx.fillText('NOVA', size/2, size * 0.85);
            }
            
            return canvas;
        }
        
        const listDiv = document.getElementById('iconList');
        
        sizes.forEach(size => {
            const canvas = drawIcon(size);
            const div = document.createElement('div');
            div.className = 'icon-item';
            const preview = document.createElement('canvas');
            preview.width = 48;
            preview.height = 48;
            preview.getContext('2d').drawImage(canvas, 0, 0, 48, 48);
            div.appendChild(preview);
            div.innerHTML += `<div>${size}x${size}</div>`;
            listDiv.appendChild(div);
        });
        
        document.getElementById('downloadAll').onclick = () => {
            const zip = new JSZip();
            sizes.forEach(size => {
                const canvas = drawIcon(size);
                const dataURL = canvas.toDataURL('image/png');
                const base64 = dataURL.split(',')[1];
                zip.file(`icon-${size}.png`, base64, { base64: true });
            });
            zip.generateAsync({ type: 'blob' }).then(content => {
                const link = document.createElement('a');
                link.download = 'nova-icons.zip';
                link.href = URL.createObjectURL(content);
                link.click();
                alert('✅ Ikonkalar yuklab olindi! assets/icons/ papkasiga oching');
            });
        };
    </script>
</body>
</html>
